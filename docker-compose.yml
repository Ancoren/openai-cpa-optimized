version: '3.8'

services:
  codex-web:
    build: .
    container_name: codex_manager
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - APP_LOG_LEVEL=INFO
      - DB_TYPE=sqlite
      - APP_WEB_PASSWORD=${WEB_PASSWORD:-admin}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Security: do NOT mount docker.sock unless absolutely necessary
    # If proxy pool mode is needed, use a separate sidecar pattern

